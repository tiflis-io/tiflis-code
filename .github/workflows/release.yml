# Release Pipeline - Manual Version Bump
#
# Упрощенный процесс релиза:
# 1. Обновите версию в package.json вручную
# 2. Закоммитьте и запушьте в main
# 3. Workflow автоматически обнаружит изменение версии и опубликует
#
# Copyright (c) 2025 Roman Barinov <rbarinov@gmail.com>
# Licensed under the MIT License.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force publish even without version change'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tiflis-code-tunnel

jobs:
  release:
    name: Release Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    
    outputs:
      published: ${{ steps.version_check.outputs.should_publish }}
      tunnel_version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@tiflis-io'
          always-auth: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "@tiflis-io/tiflis-code-tunnel" build

      - name: Run tests
        run: pnpm --filter "@tiflis-io/tiflis-code-tunnel" test

      - name: Get current version
        id: get_version
        run: |
          VERSION=$(node -p "require('./packages/tunnel/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current tunnel version: $VERSION"

      - name: Check if version changed
        id: version_check
        run: |
          CURRENT_VERSION=$(node -p "require('./packages/tunnel/package.json').version")
          
          # Try to get previous version from git
          PREVIOUS_VERSION=$(git show HEAD~1:packages/tunnel/package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0, 'utf-8')).version" 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_VERSION" ]; then
            echo "⚠️ No previous version found, checking if package exists in registry..."
            # Check if package exists in GitHub Packages
            if npm view "@tiflis-io/tiflis-code-tunnel@$CURRENT_VERSION" version 2>/dev/null; then
              echo "Package version $CURRENT_VERSION already exists"
              echo "should_publish=false" >> $GITHUB_OUTPUT
            else
              echo "✅ First publish or new version: $CURRENT_VERSION"
              echo "should_publish=true" >> $GITHUB_OUTPUT
            fi
          elif [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "✅ Version changed: $PREVIOUS_VERSION → $CURRENT_VERSION"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ Version unchanged: $CURRENT_VERSION"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure npm for GitHub Packages
        run: |
          echo "@tiflis-io:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Publish packages
        if: steps.version_check.outputs.should_publish == 'true' || github.event.inputs.force_publish == 'true'
        run: |
          echo "📦 Publishing packages to GitHub Packages..."
          cd packages/tunnel
          pnpm publish --no-git-checks --access public --registry https://npm.pkg.github.com
          cd ../workstation
          pnpm publish --no-git-checks --access public --registry https://npm.pkg.github.com || echo "Workstation package not ready for publish"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.published == 'true' || github.event.inputs.force_publish == 'true'
    
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.release.outputs.tunnel_version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/tunnel/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.release.outputs.tunnel_version }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Output image digest
        run: |
          echo "## 🐳 Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** \`linux/amd64\`, \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release, docker]
    if: needs.release.outputs.published == 'true'
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tunnel-v${{ needs.release.outputs.tunnel_version }}
          name: Tunnel Server v${{ needs.release.outputs.tunnel_version }}
          body: |
            ## 🚀 Tunnel Server v${{ needs.release.outputs.tunnel_version }}
            
            ### Docker Image
            
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/tiflis-code-tunnel:${{ needs.release.outputs.tunnel_version }}
            ```
            
            **Supported architectures:** `linux/amd64`, `linux/arm64`
            
            ### npm Package
            
            ```bash
            npm install @tiflis-io/tiflis-code-tunnel@${{ needs.release.outputs.tunnel_version }}
            ```
            
            See [CHANGELOG.md](./packages/tunnel/CHANGELOG.md) for details.
          draft: false
          prerelease: false
          generate_release_notes: true
